<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аренда Скутера</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🛵 Аренда Скутера</h1>
    <p class="price-tag">Цена: 5 BYN / час</p>

    <!-- ФОРМА ДЛЯ КЛИЕНТА -->
    <form id="orderForm">
        <input type="text" id="firstName" placeholder="Имя" required>
        <input type="text" id="lastName" placeholder="Фамилия" required>
        <input type="tel" id="phone" placeholder="Номер телефона (+375...)" required>
        
        <label>Сколько часов?</label>
        <select id="duration">
            <option value="1 час">1 час</option>
            <option value="2 часа">2 часа</option>
            <option value="3 часа">3 часа</option>
            <option value="Весь день">Весь день</option>
        </select>
        
        <label>Когда придете?</label>
        <input type="datetime-local" id="time" required>
        
        <button type="submit" class="submit-btn">Забронировать</button>
    </form>

    <div id="successMsg" class="success-message">
        ✅ Заявка отправлена!
    </div>

    <!-- КНОПКА ДЛЯ АДМИНКИ -->
    <button class="admin-access-btn" onclick="toggleAdmin()">Панель администратора (скрыто)</button>

    <!-- СЕКЦИЯ АДМИНКИ -->
    <div id="adminPanel" class="admin-section">
        <h2>Список заказов</h2>
        <table id="ordersTable">
            <thead>
                <tr>
                    <th>Клиент</th>
                    <th>Инфо</th>
                    <th>Статус</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody id="ordersBody">
                <!-- Сюда JS вставит данные -->
            </tbody>
        </table>
        <button class="clear-btn" onclick="clearAll()">Очистить всё</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
